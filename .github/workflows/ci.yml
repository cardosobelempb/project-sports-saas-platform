name: build

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Clona repositório
      - name: Checkout repository
        uses: actions/checkout@v4

      # Configura Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Instala dependências
      - name: Install dependencies
        run: npm ci

      # Prisma generate
      - name: Generate Prisma Client
        run: npx prisma generate

      # Lint
      - name: Run lint
        run: npm run lint

      # Testes
      - name: Run tests
        run: npm run test

      # Build
      - name: Build project
        run: npm run build
